<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator Free Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  background: linear-gradient(135deg,#1e3a8a,#0f172a);
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.8;
}

/* BUTTONS */
.btn{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}

/* MAIN BOX */
.container{
  max-width:600px;
  margin:-40px auto 40px;
  background:#111827;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
}

input{
  width:90%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* QR BOX */
#qrcode{
  margin-top:20px;
  background:white;
  display:inline-block;
  padding:10px;
  border-radius:10px;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:40px 20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:250px;
  text-align:center;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#0f172a;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>QR Code Generator</h1>
  <p>Create QR codes instantly for free — text, URL, WiFi & more coming soon</p>
</div>

<!-- TOOL -->
<div class="container">

<h2>Generate QR Code</h2>

<input type="text" id="text" placeholder="Enter text or URL">

<br>

<button class="btn green" onclick="generateQR()">Generate</button>
<button class="btn blue" onclick="downloadQR()">Download</button>

<div id="qrcode"></div>

</div>

<!-- FEATURES -->
<div class="cards">

<div class="card">
<h3>⚡ Fast</h3>
<p>QR instantly generate hota hai</p>
</div>

<div class="card">
<h3>📱 Mobile Friendly</h3>
<p>Har device par perfectly kaam karta hai</p>
</div>

<div class="card">
<h3>🔒 Free Tool</h3>
<p>Koi signup ya payment nahi</p>
</div>

</div>

<!-- SCRIPT -->
<script>

function generateQR(){
  let text=document.getElementById("text").value;

  document.getElementById("qrcode").innerHTML="";

  if(!text){
    alert("Enter text or URL");
    return;
  }

  new QRCode(document.getElementById("qrcode"), {
    text:text,
    width:220,
    height:220
  });
}

function downloadQR(){
  let img=document.querySelector("#qrcode img");

  if(!img){
    alert("Generate QR first");
    return;
  }

  let a=document.createElement("a");
  a.href=img.src;
  a.download="qr-code.png";
  a.click();
}

</script>

<!-- FOOTER -->
<footer>
Made with ❤️ | QR Code Generator Free Tool
</footer>

</body>
</html>
